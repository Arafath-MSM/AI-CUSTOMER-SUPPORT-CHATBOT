<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Support Admin</title> 
    <style>
      :root {
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #f5f7fb;
        margin: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        background: #101828;
        color: #ffffff;
        padding: 24px 18px;
      }

      .brand {
        font-size: 18px;
        font-weight: 900;
        margin-bottom: 28px;
      }

      .tenant {
        display: grid;
        gap: 10px;
      }

      .company-list {
        display: grid;
        gap: 8px;
        margin-top: 22px;
      }

      .company-list h2 {
        color: #ffffff;
        font-size: 13px;
        margin: 0 0 2px;
      }

      .company-row {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        display: grid;
        gap: 3px;
        padding: 10px;
        text-align: left;
      }

      .company-row.active,
      .company-row:hover {
        background: rgba(20, 99, 255, 0.35);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .company-row strong {
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .company-row span {
        color: #b7c4d7;
        font-size: 12px;
      }

      label {
        color: #465265;
        display: block;
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 7px;
      }

      aside label {
        color: #b7c4d7;
      }

      input,
      textarea {
        background: #ffffff;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        color: #172033;
        outline: none;
        padding: 10px 12px;
        width: 100%;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #1463ff;
        box-shadow: 0 0 0 3px rgba(20, 99, 255, 0.12);
      }

      main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      header {
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #d8dee9;
        display: flex;
        justify-content: space-between;
        min-height: 72px;
        padding: 0 24px;
      }

      h1 {
        font-size: 22px;
        margin: 0;
      }

      .status {
        color: #59667a;
        font-size: 13px;
      }

      .workspace {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
        padding: 22px;
      }

      .panel,
      .document,
      .match {
        background: #ffffff;
        border: 1px solid #d8dee9;
        border-radius: 8px;
      }

      .panel {
        padding: 18px;
      }

      .panel + .panel {
        margin-top: 18px;
      }

      h2 {
        font-size: 16px;
        margin: 0 0 14px;
      }

      .grid-2 {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        align-items: center;
        background: #1463ff;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        min-height: 40px;
        padding: 0 14px;
      }

      button.secondary {
        background: #ffffff;
        border: 1px solid #d8dee9;
        color: #172033;
      }

      button.danger {
        background: #d92d20;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.62;
      }

      .documents {
        display: grid;
        gap: 10px;
      }

      .document {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .document-top {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .document strong {
        font-size: 14px;
      }

      .meta {
        color: #657085;
        font-size: 12px;
      }

      .result-list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .match {
        padding: 12px;
      }

      .match p {
        color: #465265;
        font-size: 13px;
        line-height: 1.55;
        margin: 8px 0 0;
      }

      pre {
        background: #101828;
        border-radius: 8px;
        color: #d9e4f5;
        font-size: 12px;
        line-height: 1.55;
        margin: 0;
        overflow-x: auto;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .notice {
        background: #eef3ff;
        border: 1px solid #c7d7fe;
        border-radius: 8px;
        color: #26406f;
        display: none;
        font-size: 13px;
        line-height: 1.45;
        margin-bottom: 16px;
        padding: 10px 12px;
      }

      .notice.visible {
        display: block;
      }

      .chat-answer {
        color: #465265;
        line-height: 1.6;
        margin: 0;
        white-space: pre-wrap;
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        aside {
          padding: 18px;
        }

        .workspace,
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">AI Support Admin</div>
        <div class="tenant">
          <label for="companyId">Company ID</label>
          <input id="companyId" value="demo-company" />
          <label for="adminToken">Admin Token</label>
          <input id="adminToken" type="password" placeholder="dev-admin-token" autocomplete="off" />
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <div class="company-list">
          <h2>Companies</h2>
          <div id="companiesList" class="company-list"></div>
        </div>
      </aside>

      <main>
        <header>
          <h1>Knowledge Base</h1>
          <div class="status" id="statusText">Ready</div>
        </header>

        <div class="workspace">
          <section>
            <div class="notice" id="notice"></div>

            <div class="panel">
              <h2>Upload Text</h2>
              <div class="grid-2">
                <div>
                  <label for="textTitle">Title</label>
                  <input id="textTitle" placeholder="Refund and shipping policy" />
                </div>
                <div>
                  <label for="textCompanyMirror">Target Company</label>
                  <input id="textCompanyMirror" disabled />
                </div>
              </div>
              <label for="textContent" style="margin-top: 12px">Content</label>
              <textarea id="textContent" placeholder="Paste FAQ, policy, product information, or support content here."></textarea>
              <div class="actions">
                <button id="uploadTextButton" type="button">Index Text</button>
                <button id="fillSampleButton" class="secondary" type="button">Use Sample</button>
              </div>
            </div>

            <div class="panel">
              <h2>Upload File</h2>
              <div class="grid-2">
                <div>
                  <label for="fileTitle">Title</label>
                  <input id="fileTitle" placeholder="Optional custom title" />
                </div>
                <div>
                  <label for="fileInput">File</label>
                  <input id="fileInput" type="file" accept=".txt,.md,.csv,.json,.html,.htm,.pdf" />
                </div>
              </div>
              <div class="actions">
                <button id="uploadFileButton" type="button">Index File</button>
              </div>
            </div>

            <div class="panel">
              <h2>Retrieval Test</h2>
              <label for="queryInput">Question</label>
              <input id="queryInput" placeholder="What is the refund policy?" />
              <div class="actions">
                <button id="queryButton" type="button">Query Knowledge</button>
                <button id="chatButton" class="secondary" type="button">Ask Chatbot</button>
              </div>
              <div class="result-list" id="queryResults"></div>
            </div>
          </section>

          <section>
            <div class="panel">
              <h2>Indexed Documents</h2>
              <div class="documents" id="documentsList"></div>
            </div>

            <div class="panel">
              <h2>Chat Answer</h2>
              <p class="chat-answer" id="chatAnswer">Ask a question to see the final customer-facing answer.</p>
            </div>

            <div class="panel">
              <h2>Widget Embed</h2>
              <pre id="embedSnippet"></pre>
              <div class="actions">
                <button id="copyEmbedButton" class="secondary" type="button">Copy Embed</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script>
      const apiBaseUrl = window.location.origin;
      const els = {
        companyId: document.getElementById("companyId"),
        adminToken: document.getElementById("adminToken"),
        refreshButton: document.getElementById("refreshButton"),
        statusText: document.getElementById("statusText"),
        notice: document.getElementById("notice"),
        textTitle: document.getElementById("textTitle"),
        textCompanyMirror: document.getElementById("textCompanyMirror"),
        textContent: document.getElementById("textContent"),
        uploadTextButton: document.getElementById("uploadTextButton"),
        fillSampleButton: document.getElementById("fillSampleButton"),
        fileTitle: document.getElementById("fileTitle"),
        fileInput: document.getElementById("fileInput"),
        uploadFileButton: document.getElementById("uploadFileButton"),
        queryInput: document.getElementById("queryInput"),
        queryButton: document.getElementById("queryButton"),
        chatButton: document.getElementById("chatButton"),
        queryResults: document.getElementById("queryResults"),
        companiesList: document.getElementById("companiesList"),
        documentsList: document.getElementById("documentsList"),
        chatAnswer: document.getElementById("chatAnswer"),
        embedSnippet: document.getElementById("embedSnippet"),
        copyEmbedButton: document.getElementById("copyEmbedButton"),
      };

      const sampleContent = `Refund Policy: Customers can request a refund within 14 days of delivery if the item is unused and in original packaging.
Shipping Policy: Standard delivery in the UAE takes 2 to 4 business days. Express delivery takes 1 business day.
Support Hours: Customer support is available Monday to Friday, 9 AM to 6 PM Gulf Standard Time.`;

      init();

      function init() {
        els.adminToken.value = localStorage.getItem("aiSupportAdminToken") || "dev-admin-token";
        syncCompanyFields();
        refreshAll();
        renderEmbedSnippet();

        els.companyId.addEventListener("input", () => {
          syncCompanyFields();
          renderEmbedSnippet();
        });
        els.adminToken.addEventListener("input", () => {
          localStorage.setItem("aiSupportAdminToken", adminToken());
        });
        els.refreshButton.addEventListener("click", refreshAll);
        els.fillSampleButton.addEventListener("click", fillSample);
        els.uploadTextButton.addEventListener("click", uploadText);
        els.uploadFileButton.addEventListener("click", uploadFile);
        els.queryButton.addEventListener("click", queryKnowledge);
        els.chatButton.addEventListener("click", askChatbot);
        els.copyEmbedButton.addEventListener("click", copyEmbed);
      }

      async function refreshAll() {
        await refreshCompanies();
        await refreshKnowledge();
      }

      async function refreshCompanies() {
        try {
          const data = await request("/api/companies");
          renderCompanies(data.companies || []);
        } catch (error) {
          els.companiesList.innerHTML = `<div class="meta">Enter a valid admin token and refresh.</div>`;
        }
      }

      async function refreshKnowledge() {
        setStatus("Loading documents...");
        try {
          const data = await request(`/api/knowledge?company_id=${encodeURIComponent(companyId())}`);
          renderDocuments(data.documents || [], data.total_chunks || 0);
          setStatus("Ready");
        } catch (error) {
          showNotice(error.message, true);
          setStatus("Failed");
        }
      }

      async function uploadText() {
        const title = els.textTitle.value.trim();
        const content = els.textContent.value.trim();
        if (!title || !content) {
          showNotice("Add a title and content before indexing text.", true);
          return;
        }

        await withBusy(els.uploadTextButton, "Indexing...", async () => {
          const data = await request("/api/knowledge/text", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              company_id: companyId(),
              title,
              content,
            }),
          });
          showNotice(`Indexed ${data.chunks_indexed} chunk(s) for ${data.title}.`);
          els.textTitle.value = "";
          els.textContent.value = "";
          await refreshAll();
        });
      }

      async function uploadFile() {
        const file = els.fileInput.files[0];
        if (!file) {
          showNotice("Choose a supported file before indexing.", true);
          return;
        }

        const form = new FormData();
        form.append("company_id", companyId());
        form.append("title", els.fileTitle.value.trim());
        form.append("file", file);

        await withBusy(els.uploadFileButton, "Indexing...", async () => {
          const data = await request("/api/upload", {
            method: "POST",
            body: form,
          });
          showNotice(`Indexed ${data.chunks_indexed} chunk(s) for ${data.title}.`);
          els.fileTitle.value = "";
          els.fileInput.value = "";
          await refreshAll();
        });
      }

      async function queryKnowledge() {
        const query = els.queryInput.value.trim();
        if (!query) {
          showNotice("Type a question before querying.", true);
          return;
        }

        await withBusy(els.queryButton, "Searching...", async () => {
          const data = await request("/api/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              company_id: companyId(),
              query,
              top_k: 4,
            }),
          });
          renderMatches(data.matches || []);
          showNotice(`Found ${data.matches.length} matching chunk(s).`);
        });
      }

      async function askChatbot() {
        const message = els.queryInput.value.trim();
        if (!message) {
          showNotice("Type a question before asking the chatbot.", true);
          return;
        }

        await withBusy(els.chatButton, "Asking...", async () => {
          const data = await request("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              company_id: companyId(),
              message,
            }),
          });
          els.chatAnswer.textContent = data.answer;
          showNotice(`Chat answered using ${data.sources.length} source(s).`);
        });
      }

      async function deleteDocument(documentId) {
        await withBusy(null, "Deleting document...", async () => {
          await request(`/api/knowledge/${encodeURIComponent(documentId)}`, {
            method: "DELETE",
          });
          showNotice("Document deleted.");
          await refreshAll();
        });
      }

      function renderCompanies(companies) {
        if (!companies.length) {
          els.companiesList.innerHTML = `<div class="meta">No companies indexed yet.</div>`;
          return;
        }

        els.companiesList.innerHTML = companies
          .map(
            (company) => `
              <button class="company-row ${company.company_id === companyId() ? "active" : ""}" type="button" data-company="${escapeHtml(company.company_id)}">
                <strong>${escapeHtml(company.company_id)}</strong>
                <span>${company.documents_count} document(s) · ${company.total_chunks} chunk(s)</span>
              </button>
            `
          )
          .join("");

        els.companiesList.querySelectorAll("[data-company]").forEach((button) => {
          button.addEventListener("click", async () => {
            els.companyId.value = button.dataset.company;
            syncCompanyFields();
            renderEmbedSnippet();
            await refreshKnowledge();
            renderCompanies(companies);
          });
        });
      }

      function renderDocuments(documents, totalChunks) {
        if (!documents.length) {
          els.documentsList.innerHTML = `<div class="meta">No documents indexed for this company yet.</div>`;
          return;
        }

        els.documentsList.innerHTML = documents
          .map(
            (doc) => `
              <article class="document">
                <div class="document-top">
                  <strong>${escapeHtml(doc.title)}</strong>
                  <button class="danger" type="button" data-delete="${escapeHtml(doc.document_id)}">Delete</button>
                </div>
                <div class="meta">${doc.chunks_indexed} chunk(s) · ${formatDate(doc.created_at)}</div>
                <div class="meta">${doc.document_id}</div>
              </article>
            `
          )
          .join("");

        els.documentsList.querySelectorAll("[data-delete]").forEach((button) => {
          button.addEventListener("click", () => deleteDocument(button.dataset.delete));
        });
        setStatus(`${documents.length} document(s), ${totalChunks} chunk(s)`);
      }

      function renderMatches(matches) {
        if (!matches.length) {
          els.queryResults.innerHTML = `<div class="meta">No matching chunks found.</div>`;
          return;
        }

        els.queryResults.innerHTML = matches
          .map(
            (match) => `
              <article class="match">
                <strong>${escapeHtml(match.title)} · score ${match.score}</strong>
                <div class="meta">Chunk ${match.chunk_index} · ${match.document_id}</div>
                <p>${escapeHtml(match.text)}</p>
              </article>
            `
          )
          .join("");
      }

      function fillSample() {
        els.textTitle.value = "Demo Store Support Policy";
        els.textContent.value = sampleContent;
      }

      function renderEmbedSnippet() {
        const company = companyId();
        els.embedSnippet.textContent = [
          "<script",
          `  src="${apiBaseUrl}/static/widget/chatbot.js"`,
          `  data-api-base-url="${apiBaseUrl}"`,
          `  data-company-id="${company}"`,
          '  data-title="Support"',
          "></" + "script>",
        ].join("\n");
      }

      async function copyEmbed() {
        await navigator.clipboard.writeText(els.embedSnippet.textContent);
        showNotice("Embed snippet copied.");
      }

      async function request(path, options) {
        const requestOptions = withAdminHeaders(options);
        const response = await fetch(`${apiBaseUrl}${path}`, requestOptions);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Request failed.");
        }
        return data;
      }

      function withAdminHeaders(options) {
        const requestOptions = { ...(options || {}) };
        const headers = new Headers(requestOptions.headers || {});
        headers.set("X-Admin-Token", adminToken());
        requestOptions.headers = headers;
        return requestOptions;
      }

      async function withBusy(button, label, task) {
        const originalLabel = button?.textContent;
        setStatus(label);
        if (button) {
          button.disabled = true;
          button.textContent = label;
        }
        try {
          await task();
        } catch (error) {
          showNotice(error.message, true);
        } finally {
          if (button) {
            button.disabled = false;
            button.textContent = originalLabel;
          }
          setStatus("Ready");
        }
      }

      function syncCompanyFields() {
        els.textCompanyMirror.value = companyId();
      }

      function companyId() {
        return els.companyId.value.trim() || "default";
      }

      function adminToken() {
        return els.adminToken.value.trim();
      }

      function setStatus(text) {
        els.statusText.textContent = text;
      }

      function showNotice(message, isError) {
        els.notice.textContent = message;
        els.notice.style.borderColor = isError ? "#fecdca" : "#c7d7fe";
        els.notice.style.background = isError ? "#fff1f0" : "#eef3ff";
        els.notice.style.color = isError ? "#912018" : "#26406f";
        els.notice.classList.add("visible");
      }

      function formatDate(value) {
        return new Date(value).toLocaleString();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
